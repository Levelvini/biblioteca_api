spring.application.name=biblioteca

# Configurań§es do MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/biblioteca_api?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=23056623

# Dialeto do Hibernate para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ConfigurańŃo do DDL do Hibernate (create, update, validate, none)
spring.jpa.hibernate.ddl-auto=update

# Exibir SQLs gerados pelo Hibernate
spring.jpa.show-sql=true

# Formatar o SQL impresso no console
spring.jpa.properties.hibernate.format_sql=true
